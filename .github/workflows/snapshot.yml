# Produit + publie le snapshot référentiel (referential.tar.gz) comme GitHub Release, à partir d'une
# instance HotsPatchNotes FRAÎCHE (re-scrape de zéro).
#
# NOTE : ce n'est PAS le chemin de production. Le snapshot officiel est régénéré depuis le HotsPatchNotes
# du box (données accumulées riches) via scripts/publish-snapshot.sh en cron — voir README. Ce workflow
# reste en déclenchement MANUEL uniquement, comme dépannage / bootstrap public (nécessite que l'image
# ghcr.io/matella/hotspatchnotes-api existe). Pas de cron → pas d'échec quotidien.
name: referential-snapshot
on:
  workflow_dispatch: {}
jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # créer la Release
    steps:
      - uses: actions/checkout@v4
      # Démarre l'API HotsPatchNotes (image publiée) pour produire des données fraîches.
      - name: Run HotsPatchNotes API
        run: |
          docker run -d --name hpn -p 5001:8080 ghcr.io/matella/hotspatchnotes-api:latest
          for i in $(seq 1 60); do curl -fsS http://localhost:5001/api/heroes >/dev/null 2>&1 && break; sleep 3; done
      - name: Build snapshot
        run: |
          HPN_URL=http://localhost:5001 ./scripts/make-snapshot.sh ./snapshot
          mv snapshot.tar.gz referential.tar.gz
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: referential-${{ github.run_number }}
          files: referential.tar.gz
          # alias stable consommé par REFERENTIAL_URL=.../releases/latest/download/referential.tar.gz
          make_latest: true
